name: Run Palestine TOA

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Debug token presence
        shell: pwsh
        env:
          SMARTSHEET_TOKEN: ${{ secrets.SMARTSHEET_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SMARTSHEET_TOKEN)) {
            Write-Host "SMARTSHEET_TOKEN is missing"
            exit 1
          } else {
            Write-Host "SMARTSHEET_TOKEN is present"
            Write-Host "Token length: $($env:SMARTSHEET_TOKEN.Length)"
          }

      - name: Run script
        env:
          SMARTSHEET_TOKEN: ${{ secrets.SMARTSHEET_TOKEN }}
        run: |
          python PalestineTOA.py
